<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-label="After the Parks pocket map supporting mark" >

<defs>
  <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#FFF3A6"/>
    <stop offset="0.42" stop-color="#FFC94A"/>
    <stop offset="1" stop-color="#B76F15"/>
  </linearGradient>
  <radialGradient id="glowGrad" cx="50%" cy="45%" r="65%">
    <stop offset="0" stop-color="#FFFBE8"/>
    <stop offset="0.35" stop-color="#FFE36D"/>
    <stop offset="0.85" stop-color="#F2A326"/>
    <stop offset="1" stop-color="#B56F17"/>
  </radialGradient>
  <linearGradient id="navyGrad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#173B60"/>
    <stop offset="0.55" stop-color="#0B2340"/>
    <stop offset="1" stop-color="#041226"/>
  </linearGradient>
  <linearGradient id="aquaGrad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#E9FCFF"/>
    <stop offset="1" stop-color="#5BB8C4"/>
  </linearGradient>
  <linearGradient id="daySky" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#FDF6D2"/>
    <stop offset="0.4" stop-color="#BEEAF0"/>
    <stop offset="1" stop-color="#7EC7D2"/>
  </linearGradient>
  <linearGradient id="twilight" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#315A86"/>
    <stop offset="0.55" stop-color="#16385E"/>
    <stop offset="1" stop-color="#091B32"/>
  </linearGradient>
  <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
    <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#071426" flood-opacity="0.18"/>
  </filter>
  <filter id="tinyShadow" x="-30%" y="-30%" width="160%" height="160%">
    <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#071426" flood-opacity="0.22"/>
  </filter>
  <filter id="goldGlow" x="-70%" y="-70%" width="240%" height="240%">
    <feGaussianBlur stdDeviation="5" result="blur"/>
    <feColorMatrix in="blur" type="matrix" values="1 0 0 0 1  0 0.73 0 0 0.55  0 0 0.15 0 0.1  0 0 0 0.75 0" result="glow"/>
    <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <style>
    .wordmark { font-family: Georgia, 'Times New Roman', serif; fill: #0B2340; }
    .tagline { font-family: Avenir, Montserrat, Arial, sans-serif; fill: #17727F; letter-spacing: .04em; }
    .smallcaps { font-family: Avenir, Montserrat, Arial, sans-serif; letter-spacing: .16em; font-weight: 700; }
    .navy-stroke { stroke:#0B2340; stroke-linecap:round; stroke-linejoin:round; }
    .gold-stroke { stroke:#E9AD2E; stroke-linecap:round; stroke-linejoin:round; }
  </style>
</defs>

