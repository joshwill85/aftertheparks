<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Haze">
  <title>Haze</title>
  <desc>After the Parks storybook weather icon for haze.</desc>
  <defs>
    <linearGradient id="sky" x1="8" y1="6" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFD89C"/>
      <stop offset="1" stop-color="#F5E5C8"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.2" flood-color="#17324D" flood-opacity=".18"/>
    </filter>
    <style>
      @media (prefers-reduced-motion:no-preference) {
        .float { animation: float-haze 4.8s ease-in-out infinite; transform-origin: 32px 32px; }
        .drift { animation: drift-haze 5.6s ease-in-out infinite; }
        .fall { animation: fall-haze 1.9s ease-in-out infinite; }
        .slow { animation-duration: 3.2s; }
        .pulse { animation: pulse-haze 3.4s ease-in-out infinite; transform-origin: 32px 32px; }
        .flash { animation: flash-haze 2.6s ease-in-out infinite; transform-origin: 34px 40px; }
        .sparkle { animation: sparkle-haze 3.8s ease-in-out infinite; transform-origin: 52px 14px; }
        .spin { animation: spin-haze 5.5s ease-in-out infinite; transform-origin: 32px 39px; }
      }
      @keyframes float-haze { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-1.6px); } }
      @keyframes drift-haze { 0%,100% { transform: translateX(0); opacity: .95; } 50% { transform: translateX(2px); opacity: .72; } }
      @keyframes fall-haze { 0%,100% { transform: translateY(0); opacity: .95; } 50% { transform: translateY(2.2px); opacity: .65; } }
      @keyframes pulse-haze { 0%,100% { transform: scale(1); } 50% { transform: scale(1.045); } }
      @keyframes flash-haze { 0%,100% { opacity: .88; transform: scale(1); } 52% { opacity: 1; transform: scale(1.08); } }
      @keyframes sparkle-haze { 0%,100% { opacity: .45; transform: scale(.92); } 50% { opacity: 1; transform: scale(1.08); } }
      @keyframes spin-haze { 0%,100% { transform: rotate(-2deg); } 50% { transform: rotate(3deg); } }
    </style>
  </defs>
  <rect width="64" height="64" rx="18" fill="url(#sky)"/>
  <circle cx="50" cy="14" r="7" fill="#D49353" opacity=".16"/>
  <g filter="url(#softShadow)" stroke-linecap="round" stroke-linejoin="round">

      <circle class="pulse" cx="32" cy="25" r="11" fill="#FFD260" stroke="#A95F24" stroke-width="2"/>
      <path class="drift" d="M12 41c7-3 13 3 20 0s13-3 20 0" stroke="#B78158" stroke-width="2.4" stroke-linecap="round" fill="none"/>
      <path class="drift slow" d="M9 49c8-2 15 2 23 0s15-2 23 1" stroke="#D7A87A" stroke-width="2.4" stroke-linecap="round" fill="none"/>
      <path d="M16 56h32" stroke="#B78158" stroke-width="2.2" stroke-linecap="round" opacity=".75"/>

  </g>

    <g class="sparkle" stroke="#FFF6B8" stroke-width="1.8" stroke-linecap="round">
      <path d="M54 12v5M51.5 14.5h5"/>
      <path d="M11 17v4M9 19h4"/>
      <path d="M53 55v4M51 57h4"/>
    </g>

</svg>
