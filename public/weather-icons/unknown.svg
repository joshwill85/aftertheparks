<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Weather unknown">
  <title>Weather unknown</title>
  <desc>After the Parks storybook weather icon for weather unknown.</desc>
  <defs>
    <linearGradient id="sky" x1="8" y1="6" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D8D9FF"/>
      <stop offset="1" stop-color="#FFF7E9"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.2" flood-color="#17324D" flood-opacity=".18"/>
    </filter>
    <style>
      @media (prefers-reduced-motion:no-preference) {
        .float { animation: float-unknown 4.8s ease-in-out infinite; transform-origin: 32px 32px; }
        .drift { animation: drift-unknown 5.6s ease-in-out infinite; }
        .fall { animation: fall-unknown 1.9s ease-in-out infinite; }
        .slow { animation-duration: 3.2s; }
        .pulse { animation: pulse-unknown 3.4s ease-in-out infinite; transform-origin: 32px 32px; }
        .flash { animation: flash-unknown 2.6s ease-in-out infinite; transform-origin: 34px 40px; }
        .sparkle { animation: sparkle-unknown 3.8s ease-in-out infinite; transform-origin: 52px 14px; }
        .spin { animation: spin-unknown 5.5s ease-in-out infinite; transform-origin: 32px 39px; }
      }
      @keyframes float-unknown { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-1.6px); } }
      @keyframes drift-unknown { 0%,100% { transform: translateX(0); opacity: .95; } 50% { transform: translateX(2px); opacity: .72; } }
      @keyframes fall-unknown { 0%,100% { transform: translateY(0); opacity: .95; } 50% { transform: translateY(2.2px); opacity: .65; } }
      @keyframes pulse-unknown { 0%,100% { transform: scale(1); } 50% { transform: scale(1.045); } }
      @keyframes flash-unknown { 0%,100% { opacity: .88; transform: scale(1); } 52% { opacity: 1; transform: scale(1.08); } }
      @keyframes sparkle-unknown { 0%,100% { opacity: .45; transform: scale(.92); } 50% { opacity: 1; transform: scale(1.08); } }
      @keyframes spin-unknown { 0%,100% { transform: rotate(-2deg); } 50% { transform: rotate(3deg); } }
    </style>
  </defs>
  <rect width="64" height="64" rx="18" fill="url(#sky)"/>
  <circle cx="50" cy="14" r="7" fill="#7B63C7" opacity=".16"/>
  <g filter="url(#softShadow)" stroke-linecap="round" stroke-linejoin="round">

      <path d="M18 28c1-9 8-15 17-14 8 1 13 6 13 13 0 9-9 10-13 16" stroke="#5E4AA3" stroke-width="3.4" stroke-linecap="round" fill="none"/>
      <circle cx="32" cy="51" r="2.7" fill="#5E4AA3"/>
      <path class="drift" d="M13 45c6-3 13-3 19 0s12 3 19 0" stroke="#BAA7F1" stroke-width="2.2" stroke-linecap="round" fill="none"/>
      <path d="M21 19l3-5M43 18l4-4" stroke="#F7C65F" stroke-width="2" stroke-linecap="round"/>

  </g>

    <g class="sparkle" stroke="#FFF6B8" stroke-width="1.8" stroke-linecap="round">
      <path d="M54 12v5M51.5 14.5h5"/>
      <path d="M11 17v4M9 19h4"/>
      <path d="M53 55v4M51 57h4"/>
    </g>

</svg>
