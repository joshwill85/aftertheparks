<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Clear night">
  <title>Clear night</title>
  <desc>After the Parks storybook weather icon for clear night.</desc>
  <defs>
    <linearGradient id="sky" x1="8" y1="6" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#263A73"/>
      <stop offset="1" stop-color="#121A3C"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.2" flood-color="#17324D" flood-opacity=".18"/>
    </filter>
    <style>
      @media (prefers-reduced-motion:no-preference) {
        .float { animation: float-clear_night 4.8s ease-in-out infinite; transform-origin: 32px 32px; }
        .drift { animation: drift-clear_night 5.6s ease-in-out infinite; }
        .fall { animation: fall-clear_night 1.9s ease-in-out infinite; }
        .slow { animation-duration: 3.2s; }
        .pulse { animation: pulse-clear_night 3.4s ease-in-out infinite; transform-origin: 32px 32px; }
        .flash { animation: flash-clear_night 2.6s ease-in-out infinite; transform-origin: 34px 40px; }
        .sparkle { animation: sparkle-clear_night 3.8s ease-in-out infinite; transform-origin: 52px 14px; }
        .spin { animation: spin-clear_night 5.5s ease-in-out infinite; transform-origin: 32px 39px; }
      }
      @keyframes float-clear_night { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-1.6px); } }
      @keyframes drift-clear_night { 0%,100% { transform: translateX(0); opacity: .95; } 50% { transform: translateX(2px); opacity: .72; } }
      @keyframes fall-clear_night { 0%,100% { transform: translateY(0); opacity: .95; } 50% { transform: translateY(2.2px); opacity: .65; } }
      @keyframes pulse-clear_night { 0%,100% { transform: scale(1); } 50% { transform: scale(1.045); } }
      @keyframes flash-clear_night { 0%,100% { opacity: .88; transform: scale(1); } 52% { opacity: 1; transform: scale(1.08); } }
      @keyframes sparkle-clear_night { 0%,100% { opacity: .45; transform: scale(.92); } 50% { opacity: 1; transform: scale(1.08); } }
      @keyframes spin-clear_night { 0%,100% { transform: rotate(-2deg); } 50% { transform: rotate(3deg); } }
    </style>
  </defs>
  <rect width="64" height="64" rx="18" fill="url(#sky)"/>
  <circle cx="50" cy="14" r="7" fill="#F8D66D" opacity=".16"/>
  <g filter="url(#softShadow)" stroke-linecap="round" stroke-linejoin="round">

      <path class="float" d="M38 12c-8 4-11 13-7 21 3 7 11 10 18 7-4 7-14 10-22 6-9-5-12-16-7-25 4-7 11-10 18-9Z" fill="#FFE7A6" stroke="#4D3764" stroke-width="2"/>
      <path d="M13 48c7-5 14-7 21-2 6 4 12 3 17-2" stroke="#A7C6FF" stroke-width="2.4" stroke-linecap="round" fill="none"/>
      <path d="M20 42h7l3-5 3 5h8" stroke="#F8D66D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity=".85"/>

  </g>

    <g class="sparkle" stroke="#FFF6B8" stroke-width="1.8" stroke-linecap="round">
      <path d="M54 12v5M51.5 14.5h5"/>
      <path d="M11 17v4M9 19h4"/>
      <path d="M53 55v4M51 57h4"/>
    </g>

</svg>
