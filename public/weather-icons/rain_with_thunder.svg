<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Rain with thunder">
  <title>Rain with thunder</title>
  <desc>After the Parks storybook weather icon for rain with thunder.</desc>
  <defs>
    <linearGradient id="sky" x1="8" y1="6" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6F7FA9"/>
      <stop offset="1" stop-color="#DDE8FF"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.2" flood-color="#17324D" flood-opacity=".18"/>
    </filter>
    <style>
      @media (prefers-reduced-motion:no-preference) {
        .float { animation: float-rain_with_thunder 4.8s ease-in-out infinite; transform-origin: 32px 32px; }
        .drift { animation: drift-rain_with_thunder 5.6s ease-in-out infinite; }
        .fall { animation: fall-rain_with_thunder 1.9s ease-in-out infinite; }
        .slow { animation-duration: 3.2s; }
        .pulse { animation: pulse-rain_with_thunder 3.4s ease-in-out infinite; transform-origin: 32px 32px; }
        .flash { animation: flash-rain_with_thunder 2.6s ease-in-out infinite; transform-origin: 34px 40px; }
        .sparkle { animation: sparkle-rain_with_thunder 3.8s ease-in-out infinite; transform-origin: 52px 14px; }
        .spin { animation: spin-rain_with_thunder 5.5s ease-in-out infinite; transform-origin: 32px 39px; }
      }
      @keyframes float-rain_with_thunder { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-1.6px); } }
      @keyframes drift-rain_with_thunder { 0%,100% { transform: translateX(0); opacity: .95; } 50% { transform: translateX(2px); opacity: .72; } }
      @keyframes fall-rain_with_thunder { 0%,100% { transform: translateY(0); opacity: .95; } 50% { transform: translateY(2.2px); opacity: .65; } }
      @keyframes pulse-rain_with_thunder { 0%,100% { transform: scale(1); } 50% { transform: scale(1.045); } }
      @keyframes flash-rain_with_thunder { 0%,100% { opacity: .88; transform: scale(1); } 52% { opacity: 1; transform: scale(1.08); } }
      @keyframes sparkle-rain_with_thunder { 0%,100% { opacity: .45; transform: scale(.92); } 50% { opacity: 1; transform: scale(1.08); } }
      @keyframes spin-rain_with_thunder { 0%,100% { transform: rotate(-2deg); } 50% { transform: rotate(3deg); } }
    </style>
  </defs>
  <rect width="64" height="64" rx="18" fill="url(#sky)"/>
  <circle cx="50" cy="14" r="7" fill="#FFD34F" opacity=".16"/>
  <g filter="url(#softShadow)" stroke-linecap="round" stroke-linejoin="round">

      <path d="M9 29h40c7 0 12-4 12-11s-6-11-13-10c-5-8-18-9-25-1C14 6 7 12 7 20c0 5 2 8 2 9Z" fill="#EEF5FF" stroke="#33486F" stroke-width="2.5"/>
      <path class="flash" d="M35 29l-10 17h9l-4 11 15-19h-9l5-9Z" fill="#FFD957" stroke="#6A3F16" stroke-width="2" stroke-linejoin="round"/>
      <path class="fall" d="M14 37l-5 12M21 39l-4 9M51 35l-6 13M57 36l-4 9" stroke="#0A5EA8" stroke-width="3" stroke-linecap="round"/>
      <path d="M13 56c5-3 10-3 15 0s10 3 15 0 8-2 11 0" stroke="#3B8ECB" stroke-width="2.6" stroke-linecap="round" fill="none"/>
      <circle cx="48" cy="51" r="1.8" fill="#FFD957"/>

  </g>

    <g class="sparkle" stroke="#FFF6B8" stroke-width="1.8" stroke-linecap="round">
      <path d="M54 12v5M51.5 14.5h5"/>
      <path d="M11 17v4M9 19h4"/>
      <path d="M53 55v4M51 57h4"/>
    </g>

</svg>
