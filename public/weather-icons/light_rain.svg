<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Light rain">
  <title>Light rain</title>
  <desc>After the Parks storybook weather icon for light rain.</desc>
  <defs>
    <linearGradient id="sky" x1="8" y1="6" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#BBDFF5"/>
      <stop offset="1" stop-color="#F4FAFF"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.2" flood-color="#17324D" flood-opacity=".18"/>
    </filter>
    <style>
      @media (prefers-reduced-motion:no-preference) {
        .float { animation: float-light_rain 4.8s ease-in-out infinite; transform-origin: 32px 32px; }
        .drift { animation: drift-light_rain 5.6s ease-in-out infinite; }
        .fall { animation: fall-light_rain 1.9s ease-in-out infinite; }
        .slow { animation-duration: 3.2s; }
        .pulse { animation: pulse-light_rain 3.4s ease-in-out infinite; transform-origin: 32px 32px; }
        .flash { animation: flash-light_rain 2.6s ease-in-out infinite; transform-origin: 34px 40px; }
        .sparkle { animation: sparkle-light_rain 3.8s ease-in-out infinite; transform-origin: 52px 14px; }
        .spin { animation: spin-light_rain 5.5s ease-in-out infinite; transform-origin: 32px 39px; }
      }
      @keyframes float-light_rain { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-1.6px); } }
      @keyframes drift-light_rain { 0%,100% { transform: translateX(0); opacity: .95; } 50% { transform: translateX(2px); opacity: .72; } }
      @keyframes fall-light_rain { 0%,100% { transform: translateY(0); opacity: .95; } 50% { transform: translateY(2.2px); opacity: .65; } }
      @keyframes pulse-light_rain { 0%,100% { transform: scale(1); } 50% { transform: scale(1.045); } }
      @keyframes flash-light_rain { 0%,100% { opacity: .88; transform: scale(1); } 52% { opacity: 1; transform: scale(1.08); } }
      @keyframes sparkle-light_rain { 0%,100% { opacity: .45; transform: scale(.92); } 50% { opacity: 1; transform: scale(1.08); } }
      @keyframes spin-light_rain { 0%,100% { transform: rotate(-2deg); } 50% { transform: rotate(3deg); } }
    </style>
  </defs>
  <rect width="64" height="64" rx="18" fill="url(#sky)"/>
  <circle cx="50" cy="14" r="7" fill="#2E83C5" opacity=".16"/>
  <g filter="url(#softShadow)" stroke-linecap="round" stroke-linejoin="round">

      <path d="M14 30h32c6 0 10-4 10-9 0-6-5-9-10-9-4-7-15-8-21-2-7-1-13 4-13 11 0 5 2 8 2 9Z" fill="#FFFFFF" stroke="#39759A" stroke-width="2.2"/>
      <path d="M22 42c5-5 15-5 20 0" stroke="#6DB6DE" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <path d="M32 42v9" stroke="#6DB6DE" stroke-width="2.2" stroke-linecap="round"/>
      <path class="fall slow" d="M19 38l-2 5M29 37l-2 5M40 37l-2 5M50 36l-2 5" stroke="#408FD1" stroke-width="2" stroke-linecap="round"/>
      <path d="M19 55c9 2 18 2 27 0" stroke="#99CBE9" stroke-width="2" stroke-linecap="round"/>

  </g>

    <g class="sparkle" stroke="#FFF6B8" stroke-width="1.8" stroke-linecap="round">
      <path d="M54 12v5M51.5 14.5h5"/>
      <path d="M11 17v4M9 19h4"/>
      <path d="M53 55v4M51 57h4"/>
    </g>

</svg>
