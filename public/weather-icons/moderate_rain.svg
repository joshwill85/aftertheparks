<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Moderate rain">
  <title>Moderate rain</title>
  <desc>After the Parks storybook weather icon for moderate rain.</desc>
  <defs>
    <linearGradient id="sky" x1="8" y1="6" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A7CBE3"/>
      <stop offset="1" stop-color="#E9F6FF"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.2" flood-color="#17324D" flood-opacity=".18"/>
    </filter>
    <style>
      @media (prefers-reduced-motion:no-preference) {
        .float { animation: float-moderate_rain 4.8s ease-in-out infinite; transform-origin: 32px 32px; }
        .drift { animation: drift-moderate_rain 5.6s ease-in-out infinite; }
        .fall { animation: fall-moderate_rain 1.9s ease-in-out infinite; }
        .slow { animation-duration: 3.2s; }
        .pulse { animation: pulse-moderate_rain 3.4s ease-in-out infinite; transform-origin: 32px 32px; }
        .flash { animation: flash-moderate_rain 2.6s ease-in-out infinite; transform-origin: 34px 40px; }
        .sparkle { animation: sparkle-moderate_rain 3.8s ease-in-out infinite; transform-origin: 52px 14px; }
        .spin { animation: spin-moderate_rain 5.5s ease-in-out infinite; transform-origin: 32px 39px; }
      }
      @keyframes float-moderate_rain { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-1.6px); } }
      @keyframes drift-moderate_rain { 0%,100% { transform: translateX(0); opacity: .95; } 50% { transform: translateX(2px); opacity: .72; } }
      @keyframes fall-moderate_rain { 0%,100% { transform: translateY(0); opacity: .95; } 50% { transform: translateY(2.2px); opacity: .65; } }
      @keyframes pulse-moderate_rain { 0%,100% { transform: scale(1); } 50% { transform: scale(1.045); } }
      @keyframes flash-moderate_rain { 0%,100% { opacity: .88; transform: scale(1); } 52% { opacity: 1; transform: scale(1.08); } }
      @keyframes sparkle-moderate_rain { 0%,100% { opacity: .45; transform: scale(.92); } 50% { opacity: 1; transform: scale(1.08); } }
      @keyframes spin-moderate_rain { 0%,100% { transform: rotate(-2deg); } 50% { transform: rotate(3deg); } }
    </style>
  </defs>
  <rect width="64" height="64" rx="18" fill="url(#sky)"/>
  <circle cx="50" cy="14" r="7" fill="#166DB0" opacity=".16"/>
  <g filter="url(#softShadow)" stroke-linecap="round" stroke-linejoin="round">

      <path d="M11 30h37c6 0 11-4 11-10 0-7-6-10-12-9-5-8-17-9-24-1-8-1-14 4-14 12 0 5 2 8 2 8Z" fill="#F8FCFF" stroke="#2E668C" stroke-width="2.3"/>
      <g class="fall" stroke="#166DB0" stroke-width="2.8" stroke-linecap="round">
        <path d="M15 37v13"/><path d="M25 36v15"/><path d="M35 36v15"/><path d="M45 36v14"/><path d="M54 35v11"/>
      </g>
      <path d="M16 54c5-3 10-3 15 0s10 3 15 0 8-2 11 0" stroke="#5EA6D7" stroke-width="2.3" stroke-linecap="round" fill="none"/>

  </g>

    <g class="sparkle" stroke="#FFF6B8" stroke-width="1.8" stroke-linecap="round">
      <path d="M54 12v5M51.5 14.5h5"/>
      <path d="M11 17v4M9 19h4"/>
      <path d="M53 55v4M51 57h4"/>
    </g>

</svg>
