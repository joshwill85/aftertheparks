<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Torrential rain">
  <title>Torrential rain</title>
  <desc>After the Parks storybook weather icon for torrential rain.</desc>
  <defs>
    <linearGradient id="sky" x1="8" y1="6" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#526C90"/>
      <stop offset="1" stop-color="#C4DCEF"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.2" flood-color="#17324D" flood-opacity=".18"/>
    </filter>
    <style>
      @media (prefers-reduced-motion:no-preference) {
        .float { animation: float-torrential_rain 4.8s ease-in-out infinite; transform-origin: 32px 32px; }
        .drift { animation: drift-torrential_rain 5.6s ease-in-out infinite; }
        .fall { animation: fall-torrential_rain 1.9s ease-in-out infinite; }
        .slow { animation-duration: 3.2s; }
        .pulse { animation: pulse-torrential_rain 3.4s ease-in-out infinite; transform-origin: 32px 32px; }
        .flash { animation: flash-torrential_rain 2.6s ease-in-out infinite; transform-origin: 34px 40px; }
        .sparkle { animation: sparkle-torrential_rain 3.8s ease-in-out infinite; transform-origin: 52px 14px; }
        .spin { animation: spin-torrential_rain 5.5s ease-in-out infinite; transform-origin: 32px 39px; }
      }
      @keyframes float-torrential_rain { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-1.6px); } }
      @keyframes drift-torrential_rain { 0%,100% { transform: translateX(0); opacity: .95; } 50% { transform: translateX(2px); opacity: .72; } }
      @keyframes fall-torrential_rain { 0%,100% { transform: translateY(0); opacity: .95; } 50% { transform: translateY(2.2px); opacity: .65; } }
      @keyframes pulse-torrential_rain { 0%,100% { transform: scale(1); } 50% { transform: scale(1.045); } }
      @keyframes flash-torrential_rain { 0%,100% { opacity: .88; transform: scale(1); } 52% { opacity: 1; transform: scale(1.08); } }
      @keyframes sparkle-torrential_rain { 0%,100% { opacity: .45; transform: scale(.92); } 50% { opacity: 1; transform: scale(1.08); } }
      @keyframes spin-torrential_rain { 0%,100% { transform: rotate(-2deg); } 50% { transform: rotate(3deg); } }
    </style>
  </defs>
  <rect width="64" height="64" rx="18" fill="url(#sky)"/>
  <circle cx="50" cy="14" r="7" fill="#043D78" opacity=".16"/>
  <g filter="url(#softShadow)" stroke-linecap="round" stroke-linejoin="round">

      <path d="M8 28h42c7 0 12-5 12-12S56 5 49 6C43-2 28-1 22 8 13 7 6 13 6 21c0 4 1 6 2 7Z" fill="#E8F4FF" stroke="#1E4569" stroke-width="2.6"/>
      <g class="fall" stroke="#043D78" stroke-width="4.2" stroke-linecap="round">
        <path d="M11 34L4 55"/><path d="M23 33l-7 23"/><path d="M35 33l-7 23"/><path d="M47 32l-7 22"/><path d="M59 31l-6 18"/>
      </g>
      <path d="M6 58c7-5 14 4 22 0s14-4 22 0c3 1 6 1 9-1" stroke="#155F9E" stroke-width="3.2" stroke-linecap="round" fill="none"/>
      <path d="M18 52h28" stroke="#9EC8E3" stroke-width="2" stroke-linecap="round" opacity=".8"/>

  </g>

    <g class="sparkle" stroke="#FFF6B8" stroke-width="1.8" stroke-linecap="round">
      <path d="M54 12v5M51.5 14.5h5"/>
      <path d="M11 17v4M9 19h4"/>
      <path d="M53 55v4M51 57h4"/>
    </g>

</svg>
