<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Overcast">
  <title>Overcast</title>
  <desc>After the Parks storybook weather icon for overcast.</desc>
  <defs>
    <linearGradient id="sky" x1="8" y1="6" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#B9C6D5"/>
      <stop offset="1" stop-color="#E4E8ED"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.2" flood-color="#17324D" flood-opacity=".18"/>
    </filter>
    <style>
      @media (prefers-reduced-motion:no-preference) {
        .float { animation: float-overcast 4.8s ease-in-out infinite; transform-origin: 32px 32px; }
        .drift { animation: drift-overcast 5.6s ease-in-out infinite; }
        .fall { animation: fall-overcast 1.9s ease-in-out infinite; }
        .slow { animation-duration: 3.2s; }
        .pulse { animation: pulse-overcast 3.4s ease-in-out infinite; transform-origin: 32px 32px; }
        .flash { animation: flash-overcast 2.6s ease-in-out infinite; transform-origin: 34px 40px; }
        .sparkle { animation: sparkle-overcast 3.8s ease-in-out infinite; transform-origin: 52px 14px; }
        .spin { animation: spin-overcast 5.5s ease-in-out infinite; transform-origin: 32px 39px; }
      }
      @keyframes float-overcast { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-1.6px); } }
      @keyframes drift-overcast { 0%,100% { transform: translateX(0); opacity: .95; } 50% { transform: translateX(2px); opacity: .72; } }
      @keyframes fall-overcast { 0%,100% { transform: translateY(0); opacity: .95; } 50% { transform: translateY(2.2px); opacity: .65; } }
      @keyframes pulse-overcast { 0%,100% { transform: scale(1); } 50% { transform: scale(1.045); } }
      @keyframes flash-overcast { 0%,100% { opacity: .88; transform: scale(1); } 52% { opacity: 1; transform: scale(1.08); } }
      @keyframes sparkle-overcast { 0%,100% { opacity: .45; transform: scale(.92); } 50% { opacity: 1; transform: scale(1.08); } }
      @keyframes spin-overcast { 0%,100% { transform: rotate(-2deg); } 50% { transform: rotate(3deg); } }
    </style>
  </defs>
  <rect width="64" height="64" rx="18" fill="url(#sky)"/>
  <circle cx="50" cy="14" r="7" fill="#65768A" opacity=".16"/>
  <g filter="url(#softShadow)" stroke-linecap="round" stroke-linejoin="round">

      <path d="M8 35h39c6 0 10-3 10-8s-4-9-10-9c-3-7-13-9-19-4-6-2-12 1-15 6-5 0-9 4-9 9 0 3 2 5 4 6Z" fill="#DDE5EC" stroke="#53697C" stroke-width="2.2" stroke-linejoin="round"/>
      <path d="M15 45h34c6 0 10-3 10-8s-5-9-11-8c-4-5-12-6-17-2-6-2-13 1-16 7-5 0-8 3-8 7 0 2 3 4 8 4Z" fill="#F4F7FA" stroke="#53697C" stroke-width="2.2" stroke-linejoin="round"/>
      <path d="M13 52c9-2 25-2 39 0" stroke="#7C8C9B" stroke-width="2.2" stroke-linecap="round"/>

  </g>

    <g class="sparkle" stroke="#FFF6B8" stroke-width="1.8" stroke-linecap="round">
      <path d="M54 12v5M51.5 14.5h5"/>
      <path d="M11 17v4M9 19h4"/>
      <path d="M53 55v4M51 57h4"/>
    </g>

</svg>
