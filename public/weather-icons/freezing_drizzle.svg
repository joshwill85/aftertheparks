<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Freezing drizzle">
  <title>Freezing drizzle</title>
  <desc>After the Parks storybook weather icon for freezing drizzle.</desc>
  <defs>
    <linearGradient id="sky" x1="8" y1="6" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D7F7FF"/>
      <stop offset="1" stop-color="#F9FEFF"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.2" flood-color="#17324D" flood-opacity=".18"/>
    </filter>
    <style>
      @media (prefers-reduced-motion:no-preference) {
        .float { animation: float-freezing_drizzle 4.8s ease-in-out infinite; transform-origin: 32px 32px; }
        .drift { animation: drift-freezing_drizzle 5.6s ease-in-out infinite; }
        .fall { animation: fall-freezing_drizzle 1.9s ease-in-out infinite; }
        .slow { animation-duration: 3.2s; }
        .pulse { animation: pulse-freezing_drizzle 3.4s ease-in-out infinite; transform-origin: 32px 32px; }
        .flash { animation: flash-freezing_drizzle 2.6s ease-in-out infinite; transform-origin: 34px 40px; }
        .sparkle { animation: sparkle-freezing_drizzle 3.8s ease-in-out infinite; transform-origin: 52px 14px; }
        .spin { animation: spin-freezing_drizzle 5.5s ease-in-out infinite; transform-origin: 32px 39px; }
      }
      @keyframes float-freezing_drizzle { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-1.6px); } }
      @keyframes drift-freezing_drizzle { 0%,100% { transform: translateX(0); opacity: .95; } 50% { transform: translateX(2px); opacity: .72; } }
      @keyframes fall-freezing_drizzle { 0%,100% { transform: translateY(0); opacity: .95; } 50% { transform: translateY(2.2px); opacity: .65; } }
      @keyframes pulse-freezing_drizzle { 0%,100% { transform: scale(1); } 50% { transform: scale(1.045); } }
      @keyframes flash-freezing_drizzle { 0%,100% { opacity: .88; transform: scale(1); } 52% { opacity: 1; transform: scale(1.08); } }
      @keyframes sparkle-freezing_drizzle { 0%,100% { opacity: .45; transform: scale(.92); } 50% { opacity: 1; transform: scale(1.08); } }
      @keyframes spin-freezing_drizzle { 0%,100% { transform: rotate(-2deg); } 50% { transform: rotate(3deg); } }
    </style>
  </defs>
  <rect width="64" height="64" rx="18" fill="url(#sky)"/>
  <circle cx="50" cy="14" r="7" fill="#5FB6D6" opacity=".16"/>
  <g filter="url(#softShadow)" stroke-linecap="round" stroke-linejoin="round">

      <path d="M15 31h31c5 0 9-3 9-8s-4-8-9-8c-4-7-13-8-18-2-7-1-13 3-13 10 0 4 1 6 0 8Z" fill="#FFFFFF" stroke="#5C91AA" stroke-width="2.1"/>
      <g class="fall slow" fill="#79C9E3">
        <circle cx="22" cy="40" r="1.2"/><circle cx="34" cy="42" r="1.1"/><circle cx="46" cy="40" r="1.2"/>
      </g>
      <path d="M18 51c8-2 18-2 29 0" stroke="#BDEDF6" stroke-width="2.1" stroke-linecap="round"/>
      <path d="M20 54l4 4M24 54l-4 4M34 51v8M30.5 55h7M48 53l4 4M52 53l-4 4" stroke="#8BD7EC" stroke-width="1.8" stroke-linecap="round"/>

  </g>

    <g class="sparkle" stroke="#FFF6B8" stroke-width="1.8" stroke-linecap="round">
      <path d="M54 12v5M51.5 14.5h5"/>
      <path d="M11 17v4M9 19h4"/>
      <path d="M53 55v4M51 57h4"/>
    </g>

</svg>
