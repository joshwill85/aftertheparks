<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Rain shower">
  <title>Rain shower</title>
  <desc>After the Parks storybook weather icon for rain shower.</desc>
  <defs>
    <linearGradient id="sky" x1="8" y1="6" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#B8E9FF"/>
      <stop offset="1" stop-color="#FFF4C7"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.2" flood-color="#17324D" flood-opacity=".18"/>
    </filter>
    <style>
      @media (prefers-reduced-motion:no-preference) {
        .float { animation: float-rain_shower 4.8s ease-in-out infinite; transform-origin: 32px 32px; }
        .drift { animation: drift-rain_shower 5.6s ease-in-out infinite; }
        .fall { animation: fall-rain_shower 1.9s ease-in-out infinite; }
        .slow { animation-duration: 3.2s; }
        .pulse { animation: pulse-rain_shower 3.4s ease-in-out infinite; transform-origin: 32px 32px; }
        .flash { animation: flash-rain_shower 2.6s ease-in-out infinite; transform-origin: 34px 40px; }
        .sparkle { animation: sparkle-rain_shower 3.8s ease-in-out infinite; transform-origin: 52px 14px; }
        .spin { animation: spin-rain_shower 5.5s ease-in-out infinite; transform-origin: 32px 39px; }
      }
      @keyframes float-rain_shower { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-1.6px); } }
      @keyframes drift-rain_shower { 0%,100% { transform: translateX(0); opacity: .95; } 50% { transform: translateX(2px); opacity: .72; } }
      @keyframes fall-rain_shower { 0%,100% { transform: translateY(0); opacity: .95; } 50% { transform: translateY(2.2px); opacity: .65; } }
      @keyframes pulse-rain_shower { 0%,100% { transform: scale(1); } 50% { transform: scale(1.045); } }
      @keyframes flash-rain_shower { 0%,100% { opacity: .88; transform: scale(1); } 52% { opacity: 1; transform: scale(1.08); } }
      @keyframes sparkle-rain_shower { 0%,100% { opacity: .45; transform: scale(.92); } 50% { opacity: 1; transform: scale(1.08); } }
      @keyframes spin-rain_shower { 0%,100% { transform: rotate(-2deg); } 50% { transform: rotate(3deg); } }
    </style>
  </defs>
  <rect width="64" height="64" rx="18" fill="url(#sky)"/>
  <circle cx="50" cy="14" r="7" fill="#2B8ED8" opacity=".16"/>
  <g filter="url(#softShadow)" stroke-linecap="round" stroke-linejoin="round">

      <path class="float" d="M15 19c9-8 25-8 34 1" stroke="#F6B742" stroke-width="2.8" stroke-linecap="round" fill="none"/>
      <path d="M18 18c7-5 21-5 28 0" stroke="#62C98D" stroke-width="2.2" stroke-linecap="round" fill="none" opacity=".8"/>
      <path d="M17 34h30c6 0 10-3 10-8s-5-9-11-8c-4-6-14-7-19-2-7-1-13 4-13 10 0 5 2 8 3 8Z" fill="#FFFFFF" stroke="#347899" stroke-width="2.3"/>
      <path class="fall" d="M31 41l-5 8M43 40l-5 8M52 39l-4 7" stroke="#2B8ED8" stroke-width="2.8" stroke-linecap="round"/>
      <path d="M17 53c6 3 14 3 22 0" stroke="#7DCAF0" stroke-width="2.2" stroke-linecap="round"/>

  </g>

    <g class="sparkle" stroke="#FFF6B8" stroke-width="1.8" stroke-linecap="round">
      <path d="M54 12v5M51.5 14.5h5"/>
      <path d="M11 17v4M9 19h4"/>
      <path d="M53 55v4M51 57h4"/>
    </g>

</svg>
