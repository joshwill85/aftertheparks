<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Cloudy">
  <title>Cloudy</title>
  <desc>After the Parks storybook weather icon for cloudy.</desc>
  <defs>
    <linearGradient id="sky" x1="8" y1="6" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#DDF4FF"/>
      <stop offset="1" stop-color="#EFF8FF"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.2" flood-color="#17324D" flood-opacity=".18"/>
    </filter>
    <style>
      @media (prefers-reduced-motion:no-preference) {
        .float { animation: float-cloudy 4.8s ease-in-out infinite; transform-origin: 32px 32px; }
        .drift { animation: drift-cloudy 5.6s ease-in-out infinite; }
        .fall { animation: fall-cloudy 1.9s ease-in-out infinite; }
        .slow { animation-duration: 3.2s; }
        .pulse { animation: pulse-cloudy 3.4s ease-in-out infinite; transform-origin: 32px 32px; }
        .flash { animation: flash-cloudy 2.6s ease-in-out infinite; transform-origin: 34px 40px; }
        .sparkle { animation: sparkle-cloudy 3.8s ease-in-out infinite; transform-origin: 52px 14px; }
        .spin { animation: spin-cloudy 5.5s ease-in-out infinite; transform-origin: 32px 39px; }
      }
      @keyframes float-cloudy { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-1.6px); } }
      @keyframes drift-cloudy { 0%,100% { transform: translateX(0); opacity: .95; } 50% { transform: translateX(2px); opacity: .72; } }
      @keyframes fall-cloudy { 0%,100% { transform: translateY(0); opacity: .95; } 50% { transform: translateY(2.2px); opacity: .65; } }
      @keyframes pulse-cloudy { 0%,100% { transform: scale(1); } 50% { transform: scale(1.045); } }
      @keyframes flash-cloudy { 0%,100% { opacity: .88; transform: scale(1); } 52% { opacity: 1; transform: scale(1.08); } }
      @keyframes sparkle-cloudy { 0%,100% { opacity: .45; transform: scale(.92); } 50% { opacity: 1; transform: scale(1.08); } }
      @keyframes spin-cloudy { 0%,100% { transform: rotate(-2deg); } 50% { transform: rotate(3deg); } }
    </style>
  </defs>
  <rect width="64" height="64" rx="18" fill="url(#sky)"/>
  <circle cx="50" cy="14" r="7" fill="#7AB8D6" opacity=".16"/>
  <g filter="url(#softShadow)" stroke-linecap="round" stroke-linejoin="round">

      <path d="M12 43h37c6 0 11-4 11-10 0-6-5-10-11-10h-1c-3-9-16-12-23-4-8-2-15 3-15 11 0 6 3 10 2 13Z" fill="#FFFFFF" stroke="#437594" stroke-width="2.3" stroke-linejoin="round"/>
      <path class="drift" d="M18 39c10 3 23 2 35-2" stroke="#AFDAEB" stroke-width="2.4" stroke-linecap="round" fill="none"/>
      <path d="M15 49c9-3 22-3 34 0" stroke="#8EC6D9" stroke-width="2" stroke-linecap="round" fill="none" opacity=".75"/>

  </g>

    <g class="sparkle" stroke="#FFF6B8" stroke-width="1.8" stroke-linecap="round">
      <path d="M54 12v5M51.5 14.5h5"/>
      <path d="M11 17v4M9 19h4"/>
      <path d="M53 55v4M51 57h4"/>
    </g>

</svg>
