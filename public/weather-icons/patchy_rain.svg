<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Patchy rain">
  <title>Patchy rain</title>
  <desc>After the Parks storybook weather icon for patchy rain.</desc>
  <defs>
    <linearGradient id="sky" x1="8" y1="6" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#CAE9F7"/>
      <stop offset="1" stop-color="#F6FBFF"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.2" flood-color="#17324D" flood-opacity=".18"/>
    </filter>
    <style>
      @media (prefers-reduced-motion:no-preference) {
        .float { animation: float-patchy_rain 4.8s ease-in-out infinite; transform-origin: 32px 32px; }
        .drift { animation: drift-patchy_rain 5.6s ease-in-out infinite; }
        .fall { animation: fall-patchy_rain 1.9s ease-in-out infinite; }
        .slow { animation-duration: 3.2s; }
        .pulse { animation: pulse-patchy_rain 3.4s ease-in-out infinite; transform-origin: 32px 32px; }
        .flash { animation: flash-patchy_rain 2.6s ease-in-out infinite; transform-origin: 34px 40px; }
        .sparkle { animation: sparkle-patchy_rain 3.8s ease-in-out infinite; transform-origin: 52px 14px; }
        .spin { animation: spin-patchy_rain 5.5s ease-in-out infinite; transform-origin: 32px 39px; }
      }
      @keyframes float-patchy_rain { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-1.6px); } }
      @keyframes drift-patchy_rain { 0%,100% { transform: translateX(0); opacity: .95; } 50% { transform: translateX(2px); opacity: .72; } }
      @keyframes fall-patchy_rain { 0%,100% { transform: translateY(0); opacity: .95; } 50% { transform: translateY(2.2px); opacity: .65; } }
      @keyframes pulse-patchy_rain { 0%,100% { transform: scale(1); } 50% { transform: scale(1.045); } }
      @keyframes flash-patchy_rain { 0%,100% { opacity: .88; transform: scale(1); } 52% { opacity: 1; transform: scale(1.08); } }
      @keyframes sparkle-patchy_rain { 0%,100% { opacity: .45; transform: scale(.92); } 50% { opacity: 1; transform: scale(1.08); } }
      @keyframes spin-patchy_rain { 0%,100% { transform: rotate(-2deg); } 50% { transform: rotate(3deg); } }
    </style>
  </defs>
  <rect width="64" height="64" rx="18" fill="url(#sky)"/>
  <circle cx="50" cy="14" r="7" fill="#4386C6" opacity=".16"/>
  <g filter="url(#softShadow)" stroke-linecap="round" stroke-linejoin="round">

      <circle class="float" cx="45" cy="18" r="7" fill="#FFD763" stroke="#B56A1E" stroke-width="1.8"/>
      <path d="M11 35h24c5 0 8-3 8-7s-3-7-8-7c-3-6-11-7-16-2-6-1-11 3-11 9 0 4 1 6 3 7Z" fill="#FFFFFF" stroke="#3F789D" stroke-width="2.2"/>
      <path class="fall" d="M18 42l-5 8M29 42l-4 7" stroke="#2D87D2" stroke-width="2.8" stroke-linecap="round"/>
      <path d="M36 48c6-3 12-3 18 1" stroke="#E6B75C" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <path d="M13 55c7 2 14 2 22 0" stroke="#9ACDEB" stroke-width="2.1" stroke-linecap="round"/>

  </g>

    <g class="sparkle" stroke="#FFF6B8" stroke-width="1.8" stroke-linecap="round">
      <path d="M54 12v5M51.5 14.5h5"/>
      <path d="M11 17v4M9 19h4"/>
      <path d="M53 55v4M51 57h4"/>
    </g>

</svg>
