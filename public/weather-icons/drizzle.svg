<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Drizzle">
  <title>Drizzle</title>
  <desc>After the Parks storybook weather icon for drizzle.</desc>
  <defs>
    <linearGradient id="sky" x1="8" y1="6" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D7EEF9"/>
      <stop offset="1" stop-color="#FAFDFF"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.2" flood-color="#17324D" flood-opacity=".18"/>
    </filter>
    <style>
      @media (prefers-reduced-motion:no-preference) {
        .float { animation: float-drizzle 4.8s ease-in-out infinite; transform-origin: 32px 32px; }
        .drift { animation: drift-drizzle 5.6s ease-in-out infinite; }
        .fall { animation: fall-drizzle 1.9s ease-in-out infinite; }
        .slow { animation-duration: 3.2s; }
        .pulse { animation: pulse-drizzle 3.4s ease-in-out infinite; transform-origin: 32px 32px; }
        .flash { animation: flash-drizzle 2.6s ease-in-out infinite; transform-origin: 34px 40px; }
        .sparkle { animation: sparkle-drizzle 3.8s ease-in-out infinite; transform-origin: 52px 14px; }
        .spin { animation: spin-drizzle 5.5s ease-in-out infinite; transform-origin: 32px 39px; }
      }
      @keyframes float-drizzle { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-1.6px); } }
      @keyframes drift-drizzle { 0%,100% { transform: translateX(0); opacity: .95; } 50% { transform: translateX(2px); opacity: .72; } }
      @keyframes fall-drizzle { 0%,100% { transform: translateY(0); opacity: .95; } 50% { transform: translateY(2.2px); opacity: .65; } }
      @keyframes pulse-drizzle { 0%,100% { transform: scale(1); } 50% { transform: scale(1.045); } }
      @keyframes flash-drizzle { 0%,100% { opacity: .88; transform: scale(1); } 52% { opacity: 1; transform: scale(1.08); } }
      @keyframes sparkle-drizzle { 0%,100% { opacity: .45; transform: scale(.92); } 50% { opacity: 1; transform: scale(1.08); } }
      @keyframes spin-drizzle { 0%,100% { transform: rotate(-2deg); } 50% { transform: rotate(3deg); } }
    </style>
  </defs>
  <rect width="64" height="64" rx="18" fill="url(#sky)"/>
  <circle cx="50" cy="14" r="7" fill="#6BAED8" opacity=".16"/>
  <g filter="url(#softShadow)" stroke-linecap="round" stroke-linejoin="round">

      <path d="M16 32h30c5 0 9-3 9-8s-4-8-9-8c-3-6-12-8-17-3-7-1-13 3-13 10 0 4 1 6 0 9Z" fill="#FFFFFF" stroke="#6096B5" stroke-width="2.1"/>
      <g class="fall slow" fill="#65ADD8">
        <circle cx="20" cy="41" r="1.3"/><circle cx="30" cy="43" r="1.2"/><circle cx="40" cy="41" r="1.2"/><circle cx="50" cy="43" r="1.1"/>
        <circle cx="24" cy="50" r="1.4"/><circle cx="36" cy="51" r="1.1"/><circle cx="47" cy="50" r="1.3"/>
      </g>
      <path d="M18 56c8 1 18 1 28 0" stroke="#B6DFEF" stroke-width="2" stroke-linecap="round"/>

  </g>

    <g class="sparkle" stroke="#FFF6B8" stroke-width="1.8" stroke-linecap="round">
      <path d="M54 12v5M51.5 14.5h5"/>
      <path d="M11 17v4M9 19h4"/>
      <path d="M53 55v4M51 57h4"/>
    </g>

</svg>
