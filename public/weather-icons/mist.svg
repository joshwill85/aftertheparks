<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Mist">
  <title>Mist</title>
  <desc>After the Parks storybook weather icon for mist.</desc>
  <defs>
    <linearGradient id="sky" x1="8" y1="6" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D7F0EE"/>
      <stop offset="1" stop-color="#F6FCFA"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.2" flood-color="#17324D" flood-opacity=".18"/>
    </filter>
    <style>
      @media (prefers-reduced-motion:no-preference) {
        .float { animation: float-mist 4.8s ease-in-out infinite; transform-origin: 32px 32px; }
        .drift { animation: drift-mist 5.6s ease-in-out infinite; }
        .fall { animation: fall-mist 1.9s ease-in-out infinite; }
        .slow { animation-duration: 3.2s; }
        .pulse { animation: pulse-mist 3.4s ease-in-out infinite; transform-origin: 32px 32px; }
        .flash { animation: flash-mist 2.6s ease-in-out infinite; transform-origin: 34px 40px; }
        .sparkle { animation: sparkle-mist 3.8s ease-in-out infinite; transform-origin: 52px 14px; }
        .spin { animation: spin-mist 5.5s ease-in-out infinite; transform-origin: 32px 39px; }
      }
      @keyframes float-mist { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-1.6px); } }
      @keyframes drift-mist { 0%,100% { transform: translateX(0); opacity: .95; } 50% { transform: translateX(2px); opacity: .72; } }
      @keyframes fall-mist { 0%,100% { transform: translateY(0); opacity: .95; } 50% { transform: translateY(2.2px); opacity: .65; } }
      @keyframes pulse-mist { 0%,100% { transform: scale(1); } 50% { transform: scale(1.045); } }
      @keyframes flash-mist { 0%,100% { opacity: .88; transform: scale(1); } 52% { opacity: 1; transform: scale(1.08); } }
      @keyframes sparkle-mist { 0%,100% { opacity: .45; transform: scale(.92); } 50% { opacity: 1; transform: scale(1.08); } }
      @keyframes spin-mist { 0%,100% { transform: rotate(-2deg); } 50% { transform: rotate(3deg); } }
    </style>
  </defs>
  <rect width="64" height="64" rx="18" fill="url(#sky)"/>
  <circle cx="50" cy="14" r="7" fill="#7BBAB2" opacity=".16"/>
  <g filter="url(#softShadow)" stroke-linecap="round" stroke-linejoin="round">

      <path d="M15 33h32c5 0 8-3 8-7s-4-7-8-7c-3-7-12-8-17-3-7-1-13 3-13 10 0 4 1 6-2 7Z" fill="#FFFFFF" stroke="#57948F" stroke-width="2.1"/>
      <path class="drift" d="M9 43c9-3 16 3 25 0s14-3 21 0" stroke="#7DBBB5" stroke-width="2.4" stroke-linecap="round" fill="none"/>
      <path class="drift slow" d="M11 51c7-2 14 2 22 0s15-3 22 1" stroke="#A7D6D1" stroke-width="2.3" stroke-linecap="round" fill="none"/>

  </g>

    <g class="sparkle" stroke="#FFF6B8" stroke-width="1.8" stroke-linecap="round">
      <path d="M54 12v5M51.5 14.5h5"/>
      <path d="M11 17v4M9 19h4"/>
      <path d="M53 55v4M51 57h4"/>
    </g>

</svg>
