<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Smoke">
  <title>Smoke</title>
  <desc>After the Parks storybook weather icon for smoke.</desc>
  <defs>
    <linearGradient id="sky" x1="8" y1="6" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D3D0C9"/>
      <stop offset="1" stop-color="#F2EEE6"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.2" flood-color="#17324D" flood-opacity=".18"/>
    </filter>
    <style>
      @media (prefers-reduced-motion:no-preference) {
        .float { animation: float-smoke 4.8s ease-in-out infinite; transform-origin: 32px 32px; }
        .drift { animation: drift-smoke 5.6s ease-in-out infinite; }
        .fall { animation: fall-smoke 1.9s ease-in-out infinite; }
        .slow { animation-duration: 3.2s; }
        .pulse { animation: pulse-smoke 3.4s ease-in-out infinite; transform-origin: 32px 32px; }
        .flash { animation: flash-smoke 2.6s ease-in-out infinite; transform-origin: 34px 40px; }
        .sparkle { animation: sparkle-smoke 3.8s ease-in-out infinite; transform-origin: 52px 14px; }
        .spin { animation: spin-smoke 5.5s ease-in-out infinite; transform-origin: 32px 39px; }
      }
      @keyframes float-smoke { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-1.6px); } }
      @keyframes drift-smoke { 0%,100% { transform: translateX(0); opacity: .95; } 50% { transform: translateX(2px); opacity: .72; } }
      @keyframes fall-smoke { 0%,100% { transform: translateY(0); opacity: .95; } 50% { transform: translateY(2.2px); opacity: .65; } }
      @keyframes pulse-smoke { 0%,100% { transform: scale(1); } 50% { transform: scale(1.045); } }
      @keyframes flash-smoke { 0%,100% { opacity: .88; transform: scale(1); } 52% { opacity: 1; transform: scale(1.08); } }
      @keyframes sparkle-smoke { 0%,100% { opacity: .45; transform: scale(.92); } 50% { opacity: 1; transform: scale(1.08); } }
      @keyframes spin-smoke { 0%,100% { transform: rotate(-2deg); } 50% { transform: rotate(3deg); } }
    </style>
  </defs>
  <rect width="64" height="64" rx="18" fill="url(#sky)"/>
  <circle cx="50" cy="14" r="7" fill="#6F6B68" opacity=".16"/>
  <g filter="url(#softShadow)" stroke-linecap="round" stroke-linejoin="round">

      <path class="drift" d="M27 52c-8-8 5-11-1-18-4-5-1-10 6-13" stroke="#6E6C6B" stroke-width="3" stroke-linecap="round" fill="none"/>
      <path class="drift slow" d="M38 52c-6-7 7-10 1-17-5-6 1-11 8-15" stroke="#8B8984" stroke-width="3" stroke-linecap="round" fill="none"/>
      <path d="M16 49c7 5 25 7 36 0" stroke="#B0AAA3" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <path d="M22 56h20" stroke="#6E6C6B" stroke-width="2.2" stroke-linecap="round"/>

  </g>

    <g class="sparkle" stroke="#FFF6B8" stroke-width="1.8" stroke-linecap="round">
      <path d="M54 12v5M51.5 14.5h5"/>
      <path d="M11 17v4M9 19h4"/>
      <path d="M53 55v4M51 57h4"/>
    </g>

</svg>
