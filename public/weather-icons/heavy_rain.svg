<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Heavy rain">
  <title>Heavy rain</title>
  <desc>After the Parks storybook weather icon for heavy rain.</desc>
  <defs>
    <linearGradient id="sky" x1="8" y1="6" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7499B9"/>
      <stop offset="1" stop-color="#D7ECFA"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.2" flood-color="#17324D" flood-opacity=".18"/>
    </filter>
    <style>
      @media (prefers-reduced-motion:no-preference) {
        .float { animation: float-heavy_rain 4.8s ease-in-out infinite; transform-origin: 32px 32px; }
        .drift { animation: drift-heavy_rain 5.6s ease-in-out infinite; }
        .fall { animation: fall-heavy_rain 1.9s ease-in-out infinite; }
        .slow { animation-duration: 3.2s; }
        .pulse { animation: pulse-heavy_rain 3.4s ease-in-out infinite; transform-origin: 32px 32px; }
        .flash { animation: flash-heavy_rain 2.6s ease-in-out infinite; transform-origin: 34px 40px; }
        .sparkle { animation: sparkle-heavy_rain 3.8s ease-in-out infinite; transform-origin: 52px 14px; }
        .spin { animation: spin-heavy_rain 5.5s ease-in-out infinite; transform-origin: 32px 39px; }
      }
      @keyframes float-heavy_rain { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-1.6px); } }
      @keyframes drift-heavy_rain { 0%,100% { transform: translateX(0); opacity: .95; } 50% { transform: translateX(2px); opacity: .72; } }
      @keyframes fall-heavy_rain { 0%,100% { transform: translateY(0); opacity: .95; } 50% { transform: translateY(2.2px); opacity: .65; } }
      @keyframes pulse-heavy_rain { 0%,100% { transform: scale(1); } 50% { transform: scale(1.045); } }
      @keyframes flash-heavy_rain { 0%,100% { opacity: .88; transform: scale(1); } 52% { opacity: 1; transform: scale(1.08); } }
      @keyframes sparkle-heavy_rain { 0%,100% { opacity: .45; transform: scale(.92); } 50% { opacity: 1; transform: scale(1.08); } }
      @keyframes spin-heavy_rain { 0%,100% { transform: rotate(-2deg); } 50% { transform: rotate(3deg); } }
    </style>
  </defs>
  <rect width="64" height="64" rx="18" fill="url(#sky)"/>
  <circle cx="50" cy="14" r="7" fill="#075A9A" opacity=".16"/>
  <g filter="url(#softShadow)" stroke-linecap="round" stroke-linejoin="round">

      <path d="M9 29h40c7 0 12-5 12-11s-6-11-13-10c-5-8-18-9-25-1-8-1-15 5-15 13 0 5 2 8 1 9Z" fill="#ECF7FF" stroke="#245577" stroke-width="2.5"/>
      <g class="fall" stroke="#075A9A" stroke-width="3.5" stroke-linecap="round">
        <path d="M15 36l-7 14"/><path d="M28 35l-7 16"/><path d="M41 35l-7 16"/><path d="M54 34l-7 14"/>
      </g>
      <path d="M10 55c4 4 10 4 15 0M27 56c5 3 11 3 17-1M46 55c4 2 8 2 12-1" stroke="#2B86C5" stroke-width="3" stroke-linecap="round" fill="none"/>
      <circle cx="18" cy="51" r="1.8" fill="#2B86C5"/><circle cx="42" cy="52" r="1.6" fill="#2B86C5"/>

  </g>

    <g class="sparkle" stroke="#FFF6B8" stroke-width="1.8" stroke-linecap="round">
      <path d="M54 12v5M51.5 14.5h5"/>
      <path d="M11 17v4M9 19h4"/>
      <path d="M53 55v4M51 57h4"/>
    </g>

</svg>
