<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Dust">
  <title>Dust</title>
  <desc>After the Parks storybook weather icon for dust.</desc>
  <defs>
    <linearGradient id="sky" x1="8" y1="6" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EFCB8B"/>
      <stop offset="1" stop-color="#FFF1CF"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.2" flood-color="#17324D" flood-opacity=".18"/>
    </filter>
    <style>
      @media (prefers-reduced-motion:no-preference) {
        .float { animation: float-dust 4.8s ease-in-out infinite; transform-origin: 32px 32px; }
        .drift { animation: drift-dust 5.6s ease-in-out infinite; }
        .fall { animation: fall-dust 1.9s ease-in-out infinite; }
        .slow { animation-duration: 3.2s; }
        .pulse { animation: pulse-dust 3.4s ease-in-out infinite; transform-origin: 32px 32px; }
        .flash { animation: flash-dust 2.6s ease-in-out infinite; transform-origin: 34px 40px; }
        .sparkle { animation: sparkle-dust 3.8s ease-in-out infinite; transform-origin: 52px 14px; }
        .spin { animation: spin-dust 5.5s ease-in-out infinite; transform-origin: 32px 39px; }
      }
      @keyframes float-dust { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-1.6px); } }
      @keyframes drift-dust { 0%,100% { transform: translateX(0); opacity: .95; } 50% { transform: translateX(2px); opacity: .72; } }
      @keyframes fall-dust { 0%,100% { transform: translateY(0); opacity: .95; } 50% { transform: translateY(2.2px); opacity: .65; } }
      @keyframes pulse-dust { 0%,100% { transform: scale(1); } 50% { transform: scale(1.045); } }
      @keyframes flash-dust { 0%,100% { opacity: .88; transform: scale(1); } 52% { opacity: 1; transform: scale(1.08); } }
      @keyframes sparkle-dust { 0%,100% { opacity: .45; transform: scale(.92); } 50% { opacity: 1; transform: scale(1.08); } }
      @keyframes spin-dust { 0%,100% { transform: rotate(-2deg); } 50% { transform: rotate(3deg); } }
    </style>
  </defs>
  <rect width="64" height="64" rx="18" fill="url(#sky)"/>
  <circle cx="50" cy="14" r="7" fill="#B97836" opacity=".16"/>
  <g filter="url(#softShadow)" stroke-linecap="round" stroke-linejoin="round">

      <path class="spin" d="M16 35c6-10 23-13 34-4 6 5 4 14-5 17-11 4-25 0-30-8" stroke="#B97836" stroke-width="3" stroke-linecap="round" fill="none"/>
      <path d="M20 44c8-5 22-5 31 1" stroke="#D79B50" stroke-width="2.4" stroke-linecap="round" fill="none"/>
      <circle cx="19" cy="24" r="2.2" fill="#9D602D"/>
      <circle cx="46" cy="21" r="1.8" fill="#C9873F"/>
      <circle cx="36" cy="52" r="1.7" fill="#9D602D"/>
      <path d="M11 53c9 2 24 1 40-2" stroke="#9D602D" stroke-width="2" stroke-linecap="round"/>

  </g>

    <g class="sparkle" stroke="#FFF6B8" stroke-width="1.8" stroke-linecap="round">
      <path d="M54 12v5M51.5 14.5h5"/>
      <path d="M11 17v4M9 19h4"/>
      <path d="M53 55v4M51 57h4"/>
    </g>

</svg>
