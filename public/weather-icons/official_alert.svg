<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Official weather alert">
  <title>Official weather alert</title>
  <desc>After the Parks storybook weather icon for official weather alert.</desc>
  <defs>
    <linearGradient id="sky" x1="8" y1="6" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFD7D0"/>
      <stop offset="1" stop-color="#FFF4D9"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.2" flood-color="#17324D" flood-opacity=".18"/>
    </filter>
    <style>
      @media (prefers-reduced-motion:no-preference) {
        .float { animation: float-official_alert 4.8s ease-in-out infinite; transform-origin: 32px 32px; }
        .drift { animation: drift-official_alert 5.6s ease-in-out infinite; }
        .fall { animation: fall-official_alert 1.9s ease-in-out infinite; }
        .slow { animation-duration: 3.2s; }
        .pulse { animation: pulse-official_alert 3.4s ease-in-out infinite; transform-origin: 32px 32px; }
        .flash { animation: flash-official_alert 2.6s ease-in-out infinite; transform-origin: 34px 40px; }
        .sparkle { animation: sparkle-official_alert 3.8s ease-in-out infinite; transform-origin: 52px 14px; }
        .spin { animation: spin-official_alert 5.5s ease-in-out infinite; transform-origin: 32px 39px; }
      }
      @keyframes float-official_alert { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-1.6px); } }
      @keyframes drift-official_alert { 0%,100% { transform: translateX(0); opacity: .95; } 50% { transform: translateX(2px); opacity: .72; } }
      @keyframes fall-official_alert { 0%,100% { transform: translateY(0); opacity: .95; } 50% { transform: translateY(2.2px); opacity: .65; } }
      @keyframes pulse-official_alert { 0%,100% { transform: scale(1); } 50% { transform: scale(1.045); } }
      @keyframes flash-official_alert { 0%,100% { opacity: .88; transform: scale(1); } 52% { opacity: 1; transform: scale(1.08); } }
      @keyframes sparkle-official_alert { 0%,100% { opacity: .45; transform: scale(.92); } 50% { opacity: 1; transform: scale(1.08); } }
      @keyframes spin-official_alert { 0%,100% { transform: rotate(-2deg); } 50% { transform: rotate(3deg); } }
    </style>
  </defs>
  <rect width="64" height="64" rx="18" fill="url(#sky)"/>
  <circle cx="50" cy="14" r="7" fill="#D9362B" opacity=".16"/>
  <g filter="url(#softShadow)" stroke-linecap="round" stroke-linejoin="round">

      <path class="pulse" d="M32 8l25 44H7L32 8Z" fill="#FFE07A" stroke="#82261E" stroke-width="2.7" stroke-linejoin="round"/>
      <path d="M32 23v15" stroke="#82261E" stroke-width="4" stroke-linecap="round"/>
      <circle cx="32" cy="45" r="2.6" fill="#82261E"/>
      <path d="M15 53c8 3 26 3 34 0" stroke="#D9362B" stroke-width="2.2" stroke-linecap="round"/>

  </g>

    <g class="sparkle" stroke="#FFF6B8" stroke-width="1.8" stroke-linecap="round">
      <path d="M54 12v5M51.5 14.5h5"/>
      <path d="M11 17v4M9 19h4"/>
      <path d="M53 55v4M51 57h4"/>
    </g>

</svg>
