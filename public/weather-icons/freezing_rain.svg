<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Freezing rain">
  <title>Freezing rain</title>
  <desc>After the Parks storybook weather icon for freezing rain.</desc>
  <defs>
    <linearGradient id="sky" x1="8" y1="6" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#C3EFFF"/>
      <stop offset="1" stop-color="#F2FCFF"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.2" flood-color="#17324D" flood-opacity=".18"/>
    </filter>
    <style>
      @media (prefers-reduced-motion:no-preference) {
        .float { animation: float-freezing_rain 4.8s ease-in-out infinite; transform-origin: 32px 32px; }
        .drift { animation: drift-freezing_rain 5.6s ease-in-out infinite; }
        .fall { animation: fall-freezing_rain 1.9s ease-in-out infinite; }
        .slow { animation-duration: 3.2s; }
        .pulse { animation: pulse-freezing_rain 3.4s ease-in-out infinite; transform-origin: 32px 32px; }
        .flash { animation: flash-freezing_rain 2.6s ease-in-out infinite; transform-origin: 34px 40px; }
        .sparkle { animation: sparkle-freezing_rain 3.8s ease-in-out infinite; transform-origin: 52px 14px; }
        .spin { animation: spin-freezing_rain 5.5s ease-in-out infinite; transform-origin: 32px 39px; }
      }
      @keyframes float-freezing_rain { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-1.6px); } }
      @keyframes drift-freezing_rain { 0%,100% { transform: translateX(0); opacity: .95; } 50% { transform: translateX(2px); opacity: .72; } }
      @keyframes fall-freezing_rain { 0%,100% { transform: translateY(0); opacity: .95; } 50% { transform: translateY(2.2px); opacity: .65; } }
      @keyframes pulse-freezing_rain { 0%,100% { transform: scale(1); } 50% { transform: scale(1.045); } }
      @keyframes flash-freezing_rain { 0%,100% { opacity: .88; transform: scale(1); } 52% { opacity: 1; transform: scale(1.08); } }
      @keyframes sparkle-freezing_rain { 0%,100% { opacity: .45; transform: scale(.92); } 50% { opacity: 1; transform: scale(1.08); } }
      @keyframes spin-freezing_rain { 0%,100% { transform: rotate(-2deg); } 50% { transform: rotate(3deg); } }
    </style>
  </defs>
  <rect width="64" height="64" rx="18" fill="url(#sky)"/>
  <circle cx="50" cy="14" r="7" fill="#2E90C5" opacity=".16"/>
  <g filter="url(#softShadow)" stroke-linecap="round" stroke-linejoin="round">

      <path d="M12 30h37c6 0 10-4 10-10s-5-10-11-9c-5-8-17-8-23-1-8-1-14 4-14 12 0 5 2 8 1 8Z" fill="#FFFFFF" stroke="#477B99" stroke-width="2.3"/>
      <path class="fall" d="M18 38l-5 10M31 38l-5 10M44 37l-5 10" stroke="#2E90C5" stroke-width="2.8" stroke-linecap="round"/>
      <path d="M15 52h37" stroke="#9BE3F7" stroke-width="3" stroke-linecap="round"/>
      <path d="M22 50l-3 8M35 50l-3 8M48 50l-3 8" stroke="#66BFD9" stroke-width="2" stroke-linecap="round"/>
      <path d="M19 57c8 2 20 2 31 0" stroke="#D9FAFF" stroke-width="1.8" stroke-linecap="round"/>

  </g>

    <g class="sparkle" stroke="#FFF6B8" stroke-width="1.8" stroke-linecap="round">
      <path d="M54 12v5M51.5 14.5h5"/>
      <path d="M11 17v4M9 19h4"/>
      <path d="M53 55v4M51 57h4"/>
    </g>

</svg>
