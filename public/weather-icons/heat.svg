<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Heat">
  <title>Heat</title>
  <desc>After the Parks storybook weather icon for heat.</desc>
  <defs>
    <linearGradient id="sky" x1="8" y1="6" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFB36B"/>
      <stop offset="1" stop-color="#FFE7B3"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.2" flood-color="#17324D" flood-opacity=".18"/>
    </filter>
    <style>
      @media (prefers-reduced-motion:no-preference) {
        .float { animation: float-heat 4.8s ease-in-out infinite; transform-origin: 32px 32px; }
        .drift { animation: drift-heat 5.6s ease-in-out infinite; }
        .fall { animation: fall-heat 1.9s ease-in-out infinite; }
        .slow { animation-duration: 3.2s; }
        .pulse { animation: pulse-heat 3.4s ease-in-out infinite; transform-origin: 32px 32px; }
        .flash { animation: flash-heat 2.6s ease-in-out infinite; transform-origin: 34px 40px; }
        .sparkle { animation: sparkle-heat 3.8s ease-in-out infinite; transform-origin: 52px 14px; }
        .spin { animation: spin-heat 5.5s ease-in-out infinite; transform-origin: 32px 39px; }
      }
      @keyframes float-heat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-1.6px); } }
      @keyframes drift-heat { 0%,100% { transform: translateX(0); opacity: .95; } 50% { transform: translateX(2px); opacity: .72; } }
      @keyframes fall-heat { 0%,100% { transform: translateY(0); opacity: .95; } 50% { transform: translateY(2.2px); opacity: .65; } }
      @keyframes pulse-heat { 0%,100% { transform: scale(1); } 50% { transform: scale(1.045); } }
      @keyframes flash-heat { 0%,100% { opacity: .88; transform: scale(1); } 52% { opacity: 1; transform: scale(1.08); } }
      @keyframes sparkle-heat { 0%,100% { opacity: .45; transform: scale(.92); } 50% { opacity: 1; transform: scale(1.08); } }
      @keyframes spin-heat { 0%,100% { transform: rotate(-2deg); } 50% { transform: rotate(3deg); } }
    </style>
  </defs>
  <rect width="64" height="64" rx="18" fill="url(#sky)"/>
  <circle cx="50" cy="14" r="7" fill="#E45D2B" opacity=".16"/>
  <g filter="url(#softShadow)" stroke-linecap="round" stroke-linejoin="round">

      <circle class="pulse" cx="32" cy="24" r="12" fill="#FFD04D" stroke="#923F16" stroke-width="2.4"/>
      <path class="drift" d="M19 43c-5-6 5-9 0-15M32 46c-5-6 5-10 0-16M45 43c-5-6 5-9 0-15" stroke="#C64C25" stroke-width="2.8" stroke-linecap="round" fill="none"/>
      <path d="M13 54c10 3 27 3 38 0" stroke="#E9914C" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M22 50c6-2 13-2 20 0" stroke="#8E4A22" stroke-width="2" stroke-linecap="round" opacity=".65"/>

  </g>

    <g class="sparkle" stroke="#FFF6B8" stroke-width="1.8" stroke-linecap="round">
      <path d="M54 12v5M51.5 14.5h5"/>
      <path d="M11 17v4M9 19h4"/>
      <path d="M53 55v4M51 57h4"/>
    </g>

</svg>
