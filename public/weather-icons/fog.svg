<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Fog">
  <title>Fog</title>
  <desc>After the Parks storybook weather icon for fog.</desc>
  <defs>
    <linearGradient id="sky" x1="8" y1="6" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#CFD7DF"/>
      <stop offset="1" stop-color="#F7F4EF"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.2" flood-color="#17324D" flood-opacity=".18"/>
    </filter>
    <style>
      @media (prefers-reduced-motion:no-preference) {
        .float { animation: float-fog 4.8s ease-in-out infinite; transform-origin: 32px 32px; }
        .drift { animation: drift-fog 5.6s ease-in-out infinite; }
        .fall { animation: fall-fog 1.9s ease-in-out infinite; }
        .slow { animation-duration: 3.2s; }
        .pulse { animation: pulse-fog 3.4s ease-in-out infinite; transform-origin: 32px 32px; }
        .flash { animation: flash-fog 2.6s ease-in-out infinite; transform-origin: 34px 40px; }
        .sparkle { animation: sparkle-fog 3.8s ease-in-out infinite; transform-origin: 52px 14px; }
        .spin { animation: spin-fog 5.5s ease-in-out infinite; transform-origin: 32px 39px; }
      }
      @keyframes float-fog { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-1.6px); } }
      @keyframes drift-fog { 0%,100% { transform: translateX(0); opacity: .95; } 50% { transform: translateX(2px); opacity: .72; } }
      @keyframes fall-fog { 0%,100% { transform: translateY(0); opacity: .95; } 50% { transform: translateY(2.2px); opacity: .65; } }
      @keyframes pulse-fog { 0%,100% { transform: scale(1); } 50% { transform: scale(1.045); } }
      @keyframes flash-fog { 0%,100% { opacity: .88; transform: scale(1); } 52% { opacity: 1; transform: scale(1.08); } }
      @keyframes sparkle-fog { 0%,100% { opacity: .45; transform: scale(.92); } 50% { opacity: 1; transform: scale(1.08); } }
      @keyframes spin-fog { 0%,100% { transform: rotate(-2deg); } 50% { transform: rotate(3deg); } }
    </style>
  </defs>
  <rect width="64" height="64" rx="18" fill="url(#sky)"/>
  <circle cx="50" cy="14" r="7" fill="#8D99A6" opacity=".16"/>
  <g filter="url(#softShadow)" stroke-linecap="round" stroke-linejoin="round">

      <circle cx="20" cy="28" r="6" fill="#FFE6A6" opacity=".65"/>
      <path d="M17 32h31c5 0 8-3 8-7s-4-7-8-7c-3-6-11-8-17-4-7-1-13 3-13 10 0 4 1 6-1 8Z" fill="#EEF3F6" stroke="#6F8190" stroke-width="2"/>
      <path class="drift" d="M8 42h45M13 49h39M9 56h34" stroke="#7C8A98" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M45 56c3-2 6-2 9 0" stroke="#BAC3CC" stroke-width="2" stroke-linecap="round"/>

  </g>

    <g class="sparkle" stroke="#FFF6B8" stroke-width="1.8" stroke-linecap="round">
      <path d="M54 12v5M51.5 14.5h5"/>
      <path d="M11 17v4M9 19h4"/>
      <path d="M53 55v4M51 57h4"/>
    </g>

</svg>
