<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Sunny day">
  <title>Sunny day</title>
  <desc>After the Parks storybook weather icon for sunny day.</desc>
  <defs>
    <linearGradient id="sky" x1="8" y1="6" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFE8A3"/>
      <stop offset="1" stop-color="#FFF8E1"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.2" flood-color="#17324D" flood-opacity=".18"/>
    </filter>
    <style>
      @media (prefers-reduced-motion:no-preference) {
        .float { animation: float-sunny_day 4.8s ease-in-out infinite; transform-origin: 32px 32px; }
        .drift { animation: drift-sunny_day 5.6s ease-in-out infinite; }
        .fall { animation: fall-sunny_day 1.9s ease-in-out infinite; }
        .slow { animation-duration: 3.2s; }
        .pulse { animation: pulse-sunny_day 3.4s ease-in-out infinite; transform-origin: 32px 32px; }
        .flash { animation: flash-sunny_day 2.6s ease-in-out infinite; transform-origin: 34px 40px; }
        .sparkle { animation: sparkle-sunny_day 3.8s ease-in-out infinite; transform-origin: 52px 14px; }
        .spin { animation: spin-sunny_day 5.5s ease-in-out infinite; transform-origin: 32px 39px; }
      }
      @keyframes float-sunny_day { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-1.6px); } }
      @keyframes drift-sunny_day { 0%,100% { transform: translateX(0); opacity: .95; } 50% { transform: translateX(2px); opacity: .72; } }
      @keyframes fall-sunny_day { 0%,100% { transform: translateY(0); opacity: .95; } 50% { transform: translateY(2.2px); opacity: .65; } }
      @keyframes pulse-sunny_day { 0%,100% { transform: scale(1); } 50% { transform: scale(1.045); } }
      @keyframes flash-sunny_day { 0%,100% { opacity: .88; transform: scale(1); } 52% { opacity: 1; transform: scale(1.08); } }
      @keyframes sparkle-sunny_day { 0%,100% { opacity: .45; transform: scale(.92); } 50% { opacity: 1; transform: scale(1.08); } }
      @keyframes spin-sunny_day { 0%,100% { transform: rotate(-2deg); } 50% { transform: rotate(3deg); } }
    </style>
  </defs>
  <rect width="64" height="64" rx="18" fill="url(#sky)"/>
  <circle cx="50" cy="14" r="7" fill="#FFB22E" opacity=".16"/>
  <g filter="url(#softShadow)" stroke-linecap="round" stroke-linejoin="round">

      <g class="float">
        <circle cx="32" cy="28" r="11" fill="#FFD45A" stroke="#8F4E13" stroke-width="2.3"/>
        <path d="M32 7v7M32 42v7M12 28h7M45 28h7M18 14l5 5M46 14l-5 5M18 42l5-5M46 42l-5-5" stroke="#D86F1D" stroke-width="2.5" stroke-linecap="round"/>
      </g>
      <path class="draw" d="M14 49c7-4 14-4 21 0s14 4 21 0" stroke="#2E8B7C" stroke-width="3" stroke-linecap="round" fill="none"/>
      <path d="M15 47c4-6 9-7 12-3" stroke="#4FAE77" stroke-width="2.2" stroke-linecap="round" fill="none"/>

  </g>

    <g class="sparkle" stroke="#FFF6B8" stroke-width="1.8" stroke-linecap="round">
      <path d="M54 12v5M51.5 14.5h5"/>
      <path d="M11 17v4M9 19h4"/>
      <path d="M53 55v4M51 57h4"/>
    </g>

</svg>
