  </filter>
  <style>
    .wordmark { font-family: Georgia, 'Times New Roman', serif; fill: #0B2340; }
    .tagline { font-family: Avenir, Montserrat, Arial, sans-serif; fill: #17727F; letter-spacing: .04em; }
    .smallcaps { font-family: Avenir, Montserrat, Arial, sans-serif; letter-spacing: .16em; font-weight: 700; }
    .navy-stroke { stroke:#0B2340; stroke-linecap:round; stroke-linejoin:round; }
    .gold-stroke { stroke:#E9AD2E; stroke-linecap:round; stroke-linejoin:round; }
  </style>
